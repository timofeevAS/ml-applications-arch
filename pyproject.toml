[tool.ruff]
target-version = "py312"
line-length = 120
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".pytest_cache",
    ".ruff_cache",
]

[tool.ruff.lint]
select = [
    "E", # style errors
    "I", # isort: import sorting (I001, I002)
    "F", # unused imports
    "UP", # modern python syntax
    "W", # style warnings: trailing whitespace, no newline at EOF
    "RET", # return: RET503 explicit return None
    "ARG", # unused args
    "SIM", # simplify
]
ignore = []
