[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".pytest_cache",
    ".ruff_cache",
]

[tool.ruff.lint]
select = [
    "E", # style errors
    "F", # unused imports
    "I", # import sorting
    "UP", # modern python syntax
]
ignore = []
