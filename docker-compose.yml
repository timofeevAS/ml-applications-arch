services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: tsdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - timescale_data:/var/lib/postgresql/data

volumes:
  timescale_data:
